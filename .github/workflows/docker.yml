name: CivMC Website Docker Build & Publish

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "packages/**"
      - "Dockerfile"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  id-token: write   # REQUIRED for Cosign keyless signing

concurrency:
  group: civmc-website-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: harbor.imthespyke.fr
  IMAGE: harbor.imthespyke.fr/imthespyke/civmc-website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Detect version and git info
        id: vars
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./packages/server/package.json').version")
          SHA=${GITHUB_SHA::7}
          DATE=$(date -u +%Y%m%d)
          ISO_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "sha=$SHA"           >> $GITHUB_OUTPUT
          echo "date=$DATE"         >> $GITHUB_OUTPUT
          echo "iso_date=$ISO_DATE" >> $GITHUB_OUTPUT

      # -------------------------
      # PRODUCTION (main)
      # -------------------------
      - name: Ensure version does not already exist (prod only)
        if: github.ref == 'refs/heads/main'
        env:
          TAG: ${{ steps.vars.outputs.version }}
          HARBOR_USER: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASS: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail

          URL="https://${REGISTRY}/v2/imthespyke/civmc-website/manifests/${TAG}"

          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -u "${HARBOR_USER}:${HARBOR_PASS}" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "$URL")

          if [ "$CODE" = "200" ]; then
            echo "::error::Version ${TAG} already exists in Harbor. Bump version in packages/server/package.json."
            exit 1
          fi

          if [ "$CODE" != "404" ]; then
            echo "::error::Unexpected Harbor response: $CODE"
            exit 1
          fi

      - name: Build and push PRODUCTION image
        if: github.ref == 'refs/heads/main'
        id: build_prod
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.vars.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=civmc-website
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.vars.outputs.iso_date }}
            environment=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign PRODUCTION image (Cosign)
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign \
            ${{ env.IMAGE }}@${{ steps.build_prod.outputs.digest }} \
            --yes

      # -------------------------
      # NIGHTLY (dev)
      # -------------------------
      - name: Build and push NIGHTLY image
        if: github.ref == 'refs/heads/dev'
        id: build_dev
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:nightly
            ${{ env.IMAGE }}:nightly-${{ steps.vars.outputs.date }}-${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha }}
          labels: |
            org.opencontainers.image.title=civmc-website
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.vars.outputs.iso_date }}
            environment=nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign NIGHTLY image (Cosign)
        if: github.ref == 'refs/heads/dev'
        run: |
          cosign sign \
            ${{ env.IMAGE }}@${{ steps.build_dev.outputs.digest }} \
            --yes
