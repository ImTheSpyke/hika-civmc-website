name: CivMC Website Docker Build & Publish

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "packages/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  id-token: write   # REQUIRED for Cosign keyless signing

concurrency:
  group: civmc-website-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: docker.io/imthespyke/civmc-website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Detect version and git info
        id: vars
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./packages/server/package.json').version")
          SHA=${GITHUB_SHA::7}
          DATE=$(date -u +%Y%m%d)
          ISO_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "sha=$SHA"           >> $GITHUB_OUTPUT
          echo "date=$DATE"         >> $GITHUB_OUTPUT
          echo "iso_date=$ISO_DATE" >> $GITHUB_OUTPUT

      # -------------------------
      # PRODUCTION (main)
      # -------------------------
      - name: Ensure version does not already exist (prod only)
        if: github.ref == 'refs/heads/main'
        env:
          TAG: ${{ steps.vars.outputs.version }}
          HUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          HUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          TOKEN=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${HUB_USER}\",\"password\":\"${HUB_TOKEN}\"}" \
            "https://hub.docker.com/v2/users/login/" | jq -r .token)

          CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/imthespyke/civmc-website/tags/${TAG}/")

          if [ "$CODE" = "200" ]; then
            echo "::error::Version ${TAG} already exists on Docker Hub. Bump version in package.json."
            exit 1
          fi

          if [ "$CODE" != "404" ]; then
            echo "::error::Unexpected Docker Hub response: $CODE"
            exit 1
          fi

      - name: Build and push PRODUCTION image
        if: github.ref == 'refs/heads/main'
        id: build_prod
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.vars.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=civmc-website
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.vars.outputs.iso_date }}
            environment=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign PRODUCTION image (Cosign)
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign \
            ${{ env.IMAGE }}@${{ steps.build_prod.outputs.digest }} \
            --yes

      # -------------------------
      # NIGHTLY (dev)
      # -------------------------
      - name: Build and push NIGHTLY image
        if: github.ref == 'refs/heads/dev'
        id: build_dev
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:nightly
            ${{ env.IMAGE }}:nightly-${{ steps.vars.outputs.date }}-${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.sha }}
          labels: |
            org.opencontainers.image.title=civmc-website
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.vars.outputs.iso_date }}
            environment=nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign NIGHTLY image (Cosign)
        if: github.ref == 'refs/heads/dev'
        run: |
          cosign sign \
            ${{ env.IMAGE }}@${{ steps.build_dev.outputs.digest }} \
            --yes
