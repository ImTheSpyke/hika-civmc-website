services:
  app:
    build: .
    image: harbor.imthespyke.fr/imthespyke/civmc-website:nightly
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SESSION_SECRET=${SESSION_SECRET}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
      - SUPERADMIN_DISCORD_ID=${SUPERADMIN_DISCORD_ID}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - external

  db:
    image: mariadb:11
    environment:
      - MARIADB_DATABASE=${DB_NAME}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true   # db↔app only, no host or internet access for db
  external:
    driver: bridge   # app outbound (Discord OAuth, etc.) + host port binding

volumes:
  dbdata:
